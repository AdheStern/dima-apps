name: alpaca-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: alpaca-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
